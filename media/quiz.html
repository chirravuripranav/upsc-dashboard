<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC Subject Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --purple: #673ab7; --purple-dark: #512da8; --purple-light: #ede7f6; --red: #d93025; --green: #0d652d; --green-bg: #e6f4ea; --red-bg: #fce8e6; --bg: #f0ebf8; --white: #fff; --text: #202124; --muted: #5f6368; --border: #dadce0; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto','Google Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Form Container */
.form-container { max-width:680px; margin:0 auto; padding:20px 16px; }

/* Header Card */
.header-card { background:var(--white); border-radius:8px; border-top:10px solid var(--purple); padding:24px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
.header-card h1 { font-family:'Google Sans',sans-serif; font-size:2em; font-weight:400; color:var(--text); margin-bottom:8px; }
.header-card .desc { color:var(--muted); font-size:0.95em; line-height:1.5; }
.header-card .required { color:var(--red); font-size:0.85em; margin-top:12px; }

.controls { margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
.controls label { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 0.9em; cursor: pointer; }
.controls input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

/* Score Card */
.score-card { background:var(--white); border-radius:8px; padding:20px 24px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,0.1); display:none; }
.score-card.show { display:block; }
.score-card h2 { font-family:'Google Sans',sans-serif; font-size:1.8em; color:var(--purple); }
.score-details { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
.score-item { text-align:center; }
.score-item .val { font-size:2em; font-weight:700; }
.score-item .lbl { font-size:0.8em; color:var(--muted); }
.score-item .val.green { color:var(--green); }
.score-item .val.red { color:var(--red); }
.score-item .val.purple { color:var(--purple); }
.progress-bar { height:8px; background:#e0e0e0; border-radius:4px; margin-top:16px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }

/* Question Card */
.question-card { background:var(--white); border-radius:8px; padding:24px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,0.1); border-left:4px solid transparent; transition:border-color 0.3s; }
.question-card.correct { border-left-color:var(--green); background:var(--green-bg); }
.question-card.wrong { border-left-color:var(--red); background:var(--red-bg); }
.question-card .tag { display:inline-block; padding:3px 10px; border-radius:4px; font-size:0.72em; font-weight:700; letter-spacing:0.5px; margin-bottom:10px; }
.question-card .tag.pyq { background:#f3e5f5; color:#7b1fa2; }
.question-card .tag.mcq { background:#e3f2fd; color:#1565c0; }
.question-card .q-num { font-size:0.85em; color:var(--muted); margin-bottom:6px; }
.question-card .q-text { font-size:1em; font-weight:500; line-height:1.5; margin-bottom:16px; white-space: pre-wrap; }

/* Radio Options */
.option { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; margin:6px 0; border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.2s; }
.option:hover { background:#f8f9fa; border-color:#bbb; }
.option.selected { border-color:var(--purple); background:var(--purple-light); }
.option input[type="radio"] { appearance:none; width:20px; height:20px; border:2px solid var(--muted); border-radius:50%; flex-shrink:0; margin-top:2px; position:relative; cursor:pointer; }
.option input[type="radio"]:checked { border-color:var(--purple); }
.option input[type="radio"]:checked::after { content:''; position:absolute; top:3px; left:3px; width:10px; height:10px; background:var(--purple); border-radius:50%; }
.option .opt-text { font-size:0.95em; line-height:1.4; }

/* Explanation */
.explanation { display:none; margin-top:14px; padding:14px; border-radius:8px; font-size:0.9em; line-height:1.5; }
.explanation.show { display:block; }
.explanation.correct { background:var(--green-bg); border:1px solid #a8dab5; color:var(--green); }
.explanation.wrong { background:var(--red-bg); border:1px solid #f5c6cb; color:var(--red); }
.option.correct-answer { position: relative; border-color:var(--green); background:var(--green-bg); }
.option.correct-answer::after { content: '✅'; position: absolute; right: 15px; top: 12px; font-size: 1.2em; }
.option.wrong-answer { position: relative; border-color:var(--red); background:var(--red-bg); }
.option.wrong-answer::after { content: '❌'; position: absolute; right: 15px; top: 12px; font-size: 1.2em; }
.explanation strong { display:block; margin-bottom:4px; }

/* Mains Card */
.mains-card { background:var(--white); border-radius:8px; padding:24px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,0.1); border-left:4px solid #f9a825; }
.mains-card h3 { font-family:'Google Sans',sans-serif; color:#f57f17; margin-bottom:12px; font-size:1.1em; }
.mains-card .mains-q { font-weight:500; font-size:1em; line-height:1.5; margin-bottom:16px; padding:12px; background:#fff8e1; border-radius:8px; white-space: pre-wrap;}
.mains-card .approach-box { background:#f5f5f5; border-left:3px solid var(--purple); padding:14px; border-radius:0 8px 8px 0; margin:10px 0; }
.mains-card .approach-box h4 { color:var(--purple); font-size:0.9em; margin-bottom:8px; }
.mains-card .approach-box li { margin:6px 0; font-size:0.9em; color:var(--muted); }
.mains-card details { margin-top:12px; }
.mains-card summary { cursor:pointer; color:var(--green); font-weight:700; font-size:0.95em; padding:10px; background:var(--green-bg); border-radius:8px; }
.mains-card .model-text { padding:16px; background:#f5f5f5; border-radius:8px; margin-top:8px; font-size:0.9em; line-height:1.7; white-space:pre-wrap; }

/* Submit Button */
.submit-section { display:flex; justify-content:space-between; align-items:center; margin:20px 0; }
.submit-btn { padding:12px 32px; background:var(--purple); color:#fff; border:none; border-radius:4px; font-size:1em; font-weight:500; cursor:pointer; font-family:'Google Sans',sans-serif; transition:background 0.2s; }
.submit-btn:hover { background:var(--purple-dark); }
.submit-btn:disabled { background:#bbb; cursor:not-allowed; }

.loading { text-align: center; padding: 40px; color: var(--purple); font-weight: bold; font-size: 1.2em; display: none; }

@media print {
  body { background:#fff; }
  .controls, .submit-section { display:none !important; }
  .question-card, .header-card, .mains-card, .score-card { box-shadow:none; break-inside:avoid; }
}
</style>
</head>
<body>
<div class="form-container">
  <div class="header-card">
    <h1 id="headerTitle">Loading...</h1>
    <p class="desc" id="headerDesc">Subject / Topic Question Bank</p>
    <div class="controls" id="controlsDiv">
      <label><input type="checkbox" id="chkAI" checked> Generate AI MCQs</label>
      <label><input type="checkbox" id="chkPYQ" checked> Include Real PYQs</label>
      <button class="submit-btn" style="padding: 8px 16px; font-size: 0.9em;" onclick="fetchQuestions()">Load Questions</button>
    </div>
  </div>

  <div class="loading" id="loader">🧠 Groq AI is analyzing the topic and setting the paper...</div>
  <div class="score-card" id="scoreCard"></div>
  <div id="qContainer"></div>
  
  <div class="submit-section" id="submitSec" style="display:none;">
    <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">Submit Answers</button>
  </div>
</div>

<script>
// ============ STATE ============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = urlParams.get('subject') || 'polity';
const topicId = urlParams.get('topic') || 'historical_background';
const quizType = urlParams.get('type') || 'mcq'; // mcq or mains
const API = window.location.origin;

let questions = [];
let score = 0, attempted = 0, correct = 0, submitted = false;

document.getElementById('headerTitle').innerHTML = `📝 ${subjectId.toUpperCase()} — ${topicId.replace(/_/g, ' ').toUpperCase()}`;

async function fetchQuestions() {
  const includeAI = document.getElementById('chkAI').checked;
  const includePYQ = document.getElementById('chkPYQ').checked;
  
  if (!includeAI && !includePYQ) {
    alert("Please select at least one source (AI or PYQ)");
    return;
  }

  document.getElementById('qContainer').innerHTML = '';
  document.getElementById('submitSec').style.display = 'none';
  document.getElementById('scoreCard').className = 'score-card';
  document.getElementById('loader').style.display = 'block';
  questions = [];
  submitted = false;

  try {
    let pyqData = {mcqs: [], mains: []};
    if (includePYQ) {
      const r = await fetch(`${API}/api/topic_pyqs?subject=${subjectId}&topic=${topicId}`);
      pyqData = await r.json();
    }

    if (quizType === 'mcq') {
      if (includePYQ && pyqData.mcqs) {
        questions = questions.concat(pyqData.mcqs);
      }
      if (includeAI) {
        const r = await fetch(`${API}/api/generate_topic_mcqs`, {
          method: 'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({subject: subjectId, topic: topicId})
        });
        const aiMcqs = await r.json();
        if (Array.isArray(aiMcqs)) questions = questions.concat(aiMcqs);
      }
      renderMCQs();
    } else {
      // Mains
      if (includePYQ && pyqData.mains) {
        questions = questions.concat(pyqData.mains);
      }
      if (includeAI) {
        const r = await fetch(`${API}/api/generate_topic_mains`, {
          method: 'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({subject: subjectId, topic: topicId})
        });
        const aiMains = await r.json();
        if (aiMains && aiMains.q) questions.push(aiMains);
      }
      renderMains();
    }
  } catch (e) {
    alert("Error fetching questions: " + e.message);
  }
  
  document.getElementById('loader').style.display = 'none';
}

function renderMCQs() {
  const container = document.getElementById('qContainer');
  if (questions.length === 0) {
    container.innerHTML = `<p style="text-align:center; padding: 20px;">No questions found for this topic.</p>`;
    return;
  }

  questions.forEach((q, i) => {
    const qId = `q${i}`;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${qId}`;
    
    let optsHtml = q.opts.map((o, oi) => `
      <div class="option" onclick="selectOption('${qId}',${oi},this)">
        <input type="radio" name="${qId}" value="${oi}">
        <span class="opt-text">${String.fromCharCode(65+oi)}) ${o}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <span class="tag ${q.type === 'pyq' ? 'pyq' : 'mcq'}">${q.type === 'pyq' ? `📜 PYQ — ${q.year}` : '🧠 AI Generated MCQ'}</span>
      <p class="q-num">Question ${i+1} of ${questions.length}</p>
      <p class="q-text">${q.q}</p>
      <div class="options" id="opts-${qId}">${optsHtml}</div>
      <div class="explanation" id="exp-${qId}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('submitSec').style.display = 'flex';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Submit Answers';
}

function renderMains() {
  const container = document.getElementById('qContainer');
  if (questions.length === 0) {
    container.innerHTML = `<p style="text-align:center; padding: 20px;">No mains questions found for this topic.</p>`;
    return;
  }

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'mains-card';
    
    let approachHtml = (q.approach || []).map(a => `<li>${a}</li>`).join('');
    
    card.innerHTML = `
      <h3>✍️ Mains Answer Writing Practice</h3>
      <span class="tag ${q.type === 'pyq' ? 'pyq' : 'mcq'}" style="background:#e0e0e0; padding:4px 8px; border-radius:4px; font-size:0.8em; margin-bottom:12px; display:inline-block;">${q.type === 'pyq' ? `📜 PYQ — ${q.year}` : '🧠 AI Generated'}</span>
      <div class="mains-q">${q.q}</div>
      <div class="approach-box">
        <h4>📋 How to Approach:</h4>
        <ul>${approachHtml}</ul>
      </div>
      <details>
        <summary>📖 View Model Answer</summary>
        <div class="model-text">${q.model || "No model answer provided."}</div>
      </details>
    `;
    container.appendChild(card);
  });
  
  // Set as completed immediately for mains reading
  const key = `upsc_${subjectId}_${topicId}_mains`;
  localStorage.setItem(key, 'true');
}

function selectOption(qId, optIdx, el) {
  if (submitted) return;
  const opts = document.querySelectorAll(`#opts-${qId} .option`);
  opts.forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  score = 0; attempted = 0; correct = 0;

  questions.forEach((q, i) => {
    const qId = `q${i}`;
    const selected = document.querySelector(`input[name="${qId}"]:checked`);
    const card = document.getElementById(`card-${qId}`);
    const expDiv = document.getElementById(`exp-${qId}`);
    const opts = document.querySelectorAll(`#opts-${qId} .option`);

    opts.forEach(o => { o.style.pointerEvents = 'none'; });

    if (selected) {
      attempted++;
      const val = parseInt(selected.value);
      opts[q.ans].classList.add('correct-answer');
      
      if (val === q.ans) {
        correct++;
        score += 2;
        card.classList.add('correct');
        expDiv.className = 'explanation correct show';
        expDiv.innerHTML = `<strong>✅ Correct! (+2 marks)</strong>${q.exp || ''}`;
      } else {
        score -= 0.67;
        card.classList.add('wrong');
        opts[val].classList.add('wrong-answer');
        expDiv.className = 'explanation wrong show';
        expDiv.innerHTML = `<strong>❌ Wrong! (-0.67 marks) Correct: ${String.fromCharCode(65+q.ans)}</strong>${q.exp || ''}`;
      }
    } else {
      opts[q.ans].classList.add('correct-answer');
      expDiv.className = 'explanation show';
      expDiv.style.display = 'block';
      expDiv.style.background = '#fff3e0';
      expDiv.style.border = '1px solid #ffcc80';
      expDiv.style.color = '#e65100';
      expDiv.innerHTML = `<strong>⚠️ Not attempted (0 marks) Correct: ${String.fromCharCode(65+q.ans)}</strong>${q.exp || ''}`;
    }
  });

  const pct = attempted > 0 ? Math.round((correct/attempted)*100) : 0;
  const total = questions.length;
  const maxMarks = total * 2;
  const scoreCard = document.getElementById('scoreCard');
  scoreCard.className = 'score-card show';
  scoreCard.innerHTML = `
    <h2>Your Score: ${score.toFixed(2)} / ${maxMarks}</h2>
    <div class="score-details">
      <div class="score-item"><div class="val purple">${attempted}/${total}</div><div class="lbl">Attempted</div></div>
      <div class="score-item"><div class="val green">${correct}</div><div class="lbl">Correct</div></div>
      <div class="score-item"><div class="val red">${attempted - correct}</div><div class="lbl">Wrong</div></div>
      <div class="score-item"><div class="val purple">${pct}%</div><div class="lbl">Accuracy</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=70?'#0d652d':pct>=40?'#f9a825':'#d93025'}"></div></div>
  `;

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitted ✓';
  scoreCard.scrollIntoView({ behavior: 'smooth' });

  // Save completion status to local storage for the dashboard UI
  const key = `upsc_${subjectId}_${topicId}_mcq`;
  localStorage.setItem(key, 'true');

  // We can post score to backend if we want to track overall metrics.
  // Using subject and topic instead of day
  fetch(window.location.origin + '/api/score', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      user_id: 'default',
      day: 1, // Fallback for DB schema
      subject: subjectId,
      topic: topicId,
      score: parseFloat(score.toFixed(2)),
      total_marks: maxMarks,
      correct: correct,
      attempted: attempted,
      total_questions: total,
      accuracy: pct
    })
  }).catch(e => console.error("Could not sync score:", e));
}

// Initial Fetch
if (quizType === 'mains') {
  document.getElementById('chkAI').labels[0].innerHTML = '<input type="checkbox" id="chkAI" checked> Generate AI Mains Q';
}
fetchQuestions();
</script>
</body>
</html>
